<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Portfolio</title>
    <meta name="description" content="Premium portfolio for product-oriented frontend engineers." />
    <meta property="og:title" content="AI Portfolio" />
    <meta
      property="og:description"
      content="Premium portfolio for product-oriented frontend engineers."
    />
    <script>
      const storedTheme = localStorage.getItem('portfolio-theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      const isDark = storedTheme ? storedTheme === 'dark' : prefersDark
      if (isDark) document.documentElement.classList.add('dark')
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
